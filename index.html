<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde FIFA 2026 — Planning interactif</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a2e;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:16px}
.wc-header{background:#0A1628;color:#fff;padding:20px 24px;border-radius:14px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.wc-title{font-size:22px;font-weight:700}
.wc-subtitle{font-size:13px;opacity:.65;margin-top:3px}
.wc-ball{font-size:36px}
.wc-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.live-badge{background:#e24b4a;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;animation:pulse 1.5s infinite;display:none}
.api-status{font-size:11px;opacity:.6;display:flex;align-items:center;gap:5px}
.api-dot{width:7px;height:7px;border-radius:50%;background:#3b9e3b}
.api-dot.err{background:#e24b4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tabs{display:flex;background:#fff;border:1px solid #e0e3ea;border-radius:10px;overflow:hidden;margin-bottom:16px}
.tab{flex:1;padding:10px 6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#777;border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:#0A1628;border-bottom:2px solid #0A1628;background:#fff}
.tab:hover:not(.active){background:#f8f9fb}
.section{display:none}.section.active{display:block}

/* Groupes */
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#777;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px}
.ld{width:10px;height:10px;border-radius:2px}
.ld-q{background:#3b9e3b}.ld-3{background:#378ADD}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.group-card{background:#fff;border:1px solid #e0e3ea;border-radius:12px;overflow:hidden}
.group-header{background:#0A1628;color:#fff;padding:9px 14px;display:flex;justify-content:space-between;align-items:center}
.group-label{font-size:15px;font-weight:700}
.standings-table{width:100%;border-collapse:collapse;font-size:12px}
.standings-table th{padding:5px 8px;text-align:left;color:#888;font-weight:500;border-bottom:1px solid #f0f1f3;background:#f8f9fb;font-size:11px}
.standings-table td{padding:5px 8px;border-bottom:1px solid #f0f1f3}
.standings-table tr:last-child td{border-bottom:none}
.standings-table .pos{width:20px;color:#aaa;font-weight:700}
.standings-table .flag{font-size:17px;margin-right:4px}
.standings-table .num{text-align:center;width:28px;color:#555}
.standings-table .pts{text-align:center;width:32px;font-weight:700;color:#0A1628}
.standings-table tr.q1{background:#f0f9f0}
.standings-table tr.q1 td:first-child{border-left:3px solid #3b9e3b}
.standings-table tr.q3{background:#eef4fd}
.standings-table tr.q3 td:first-child{border-left:3px solid #378ADD}

/* Matchs */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.filter-bar select,.filter-bar input{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid #dde;background:#fff;color:#1a1a2e;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:#378ADD}
.refresh-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:1px solid #dde;background:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s;margin-left:auto}
.refresh-btn:hover{background:#f0f4fb;border-color:#378ADD}
.last-upd{font-size:11px;color:#aaa}
.match-day-hdr{font-size:11px;font-weight:700;color:#888;padding:10px 0 5px;border-bottom:1px solid #eee;margin-top:10px;text-transform:uppercase;letter-spacing:.6px}
.match-card{background:#fff;border:1px solid #e0e3ea;border-radius:10px;padding:11px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-top:6px;transition:.15s}
.match-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.match-card.live{border-color:#e24b4a;border-width:1.5px;background:#fffafa}
.team-side{display:flex;flex-direction:column;align-items:flex-start}
.team-side.right{align-items:flex-end}
.team-fn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}
.team-fn.right{flex-direction:row-reverse}
.tf{font-size:19px}
.score-box{text-align:center}
.score{font-size:22px;font-weight:700;letter-spacing:3px;color:#0A1628}
.meta{font-size:11px;color:#aaa;text-align:center;margin-top:2px}
.st-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
.st-live{background:#fde8e8;color:#c0392b}
.st-ft{background:#e8f5e9;color:#2e7d32}
.st-ns{background:#f5f5f5;color:#888}
.st-ht{background:#fff3e0;color:#e65100}

/* Knockout */
.ko-wrap{overflow-x:auto;padding-bottom:8px}
.ko-grid{display:grid;grid-template-columns:repeat(5,190px);gap:12px;min-width:970px}
.ko-col-title{font-size:11px;font-weight:700;color:#0A1628;text-align:center;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e0e3ea;text-transform:uppercase;letter-spacing:.5px}
.ko-match{background:#fff;border:1px solid #e0e3ea;border-radius:8px;padding:7px 10px;margin-bottom:8px}
.ko-team{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;color:#444}
.ko-score{font-size:12px;font-weight:700;color:#0A1628;min-width:14px;text-align:center}
.ko-date{font-size:10px;color:#bbb;text-align:center;margin-top:4px;border-top:1px solid #f5f5f5;padding-top:3px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e0e3ea;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:#0A1628}
.stat-lbl{font-size:11px;color:#888;margin-top:4px;font-weight:500}
.scorers-title{font-size:12px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.scorer-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid #e0e3ea;border-radius:10px;margin-bottom:6px}
.s-rank{font-size:18px;font-weight:700;color:#ccc;width:24px;text-align:center}
.s-rank.gold{color:#f0a500}
.s-info{flex:1}
.s-name{font-size:13px;font-weight:600}
.s-team{font-size:11px;color:#aaa}
.s-goals{font-size:22px;font-weight:700;color:#0A1628}
.s-goals span{font-size:11px;color:#aaa;font-weight:400}
.no-data{text-align:center;padding:24px;color:#aaa;font-size:13px;background:#fff;border:1px solid #e0e3ea;border-radius:10px}

.match-card{cursor:pointer}
.match-card .tap-hint{grid-column:1/-1;text-align:center;font-size:10px;color:#b8bcc8;margin-top:2px;display:flex;align-items:center;justify-content:center;gap:4px}
.modal-ov{position:fixed;inset:0;background:rgba(10,22,40,.55);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:24px 14px;overflow-y:auto}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:480px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);animation:popin .2s ease;overflow:hidden}
@keyframes popin{from{transform:translateY(12px) scale(.97);opacity:0}to{transform:none;opacity:1}}
.modal-hd{background:#0A1628;color:#fff;padding:18px 20px;position:relative}
.modal-x{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:17px;cursor:pointer;line-height:1}
.modal-x:hover{background:rgba(255,255,255,.25)}
.modal-meta{font-size:11px;opacity:.6;margin-bottom:10px}
.modal-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.mt-side{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.mt-fl{font-size:30px}.mt-nm{font-size:13px;font-weight:600}
.mt-score{font-size:30px;font-weight:800;letter-spacing:1px}
.modal-st{text-align:center;margin-top:10px}
.modal-bd{padding:18px 20px}
.gl-section-t{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin:0 0 10px}
.gl-list{display:flex;flex-direction:column;gap:7px}
.gl-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#f7f8fb;border-radius:9px;font-size:13px}
.gl-row.away{flex-direction:row-reverse;text-align:right;background:#f2f6fb}
.gl-min{font-weight:700;color:#0A1628;min-width:34px}
.gl-row.away .gl-min{text-align:right}
.gl-nm{flex:1;font-weight:500}
.gl-icon{font-size:15px}
.gl-empty{font-size:12.5px;color:#999;text-align:center;padding:14px 0;line-height:1.5}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #dde;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .groups-grid{grid-template-columns:1fr}
  .wc-title{font-size:17px}
  .ko-grid{grid-template-columns:repeat(5,148px)}
}
</style>
</head>

    </div>

      <button class="refresh-btn" onclick="fetchAll()">

        <i class="ti ti-refresh"></i> Actualiser
      </button>
      <span class="last-upd" id="lu"></span>
    </div>
    <div id="mc"></div>
  </div>

  <div id="knockout" class="section">
    <div class="ko-wrap"><div class="ko-grid" id="ko-grid"></div></div>
  </div>

  <div id="stats" class="section">
    <div class="stats-grid" id="sg"></div>
    <div class="scorers-title">⚽ Meilleurs buteurs</div>
    <div id="sl"></div>
  </div>

</div>

<div class="modal-ov" id="match-modal" onclick="if(event.target===this)closeMatch()">

const ALIAS = {
  'czechrepublic':'czechia','unitedstates':'usa','turkiye':'turkey',
  'cotedivoire':'ivorycoast','congodr':'drcongo','drc':'drcongo',
  'democraticrepublicofcongo':'drcongo','democraticrepublicofthecongo':'drcongo','capoverde':'capeverde',
  'koreaprepublic':'southkorea','korearepublic':'southkorea','irir':'iran'
};
function fuzzy(a, b) {
  const n = s => {
    let x = s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
    return ALIAS[x] || x;
  };
  return n(a).includes(n(b)) || n(b).includes(n(a));
}

// /get/games. Cette table id→nom (depuis /get/teams) permet de résoudre les ids
// en noms avant l'appariement. Les ids 4,6,16,23,35,42 sont des barragistes (TBD).
const API_TEAM_ID = {
  1:'Mexico', 2:'South Africa', 3:'South Korea', 4:'UEFA Path D Winner',
  5:'Canada', 6:'UEFA Path A Winner', 7:'Qatar', 8:'Switzerland',
  9:'Brazil', 10:'Morocco', 11:'Haiti', 12:'Scotland',
  13:'United States', 14:'Paraguay', 15:'Australia', 16:'UEFA Path C Winner',
  17:'Germany', 18:'Curaçao', 19:'Ivory Coast', 20:'Ecuador',
  21:'Netherlands', 22:'Japan', 23:'UEFA Path B Winner', 24:'Tunisia',
  25:'Belgium', 26:'Egypt', 27:'Iran', 28:'New Zealand',
  29:'Spain', 30:'Cape Verde', 31:'Saudi Arabia', 32:'Uruguay',
  33:'France', 34:'Senegal', 35:'IC Path 2 Winner', 36:'Norway',
  37:'Argentina', 38:'Algeria', 39:'Austria', 40:'Jordan',
  41:'Portugal', 42:'IC Path 1 Winner', 43:'Uzbekistan', 44:'Colombia',
  45:'England', 46:'Croatia', 47:'Ghana', 48:'Panama'
};
const apiTeamName = id => API_TEAM_ID[Number(id)] || '';

// Retourne {match, swap} : swap=true si l'ordre API est inversé p/r au match statique.
// Matching STRICT : les DEUX équipes doivent correspondre. Pas de fallback à une seule
// équipe (source d'appariements faux et d'inversions home/away).
function findStaticMatch(grp, home, away, date) {
  if (!home || !away) return null;
  // Ordre direct : API.home == static.home ET API.away == static.away
  let m = STATIC_MATCHES.find(x =>
    x.grp === grp && fuzzy(x.home, home) && fuzzy(x.away, away)
  );
  if (m) return { match: m, swap: false };
  // Ordre inversé : API.home == static.away ET API.away == static.home
  m = STATIC_MATCHES.find(x =>
    x.grp === grp && fuzzy(x.home, away) && fuzzy(x.away, home)
  );
  if (m) return { match: m, swap: true };
  // Aucun appariement fiable : on n'invente rien.
  return null;
}

function findTeamInGroup(grp, name) {
  return standings[grp]?.find(t => fuzzy(t.name, name));
}

function updateStandings(grp, home, away, hs, as, key) {
  const h = findTeamInGroup(grp, home);
  const a = findTeamInGroup(grp, away);
  if (!h || !a || h === a) return;
  if (h.seen.has(key)) return;
  h.seen.add(key); a.seen.add(key);
  h.pj++; a.pj++;
  h.bp += hs; h.bc += as; h.diff = h.bp - h.bc;
  a.bp += as; a.bc += hs; a.diff = a.bp - a.bc;
  if (hs > as)      { h.v++; h.pts += 3; a.d++; }
  else if (as > hs) { a.v++; a.pts += 3; h.d++; }
  else              { h.n++; h.pts++;    a.n++; a.pts++; }
}

function fmtDate(d) {
  return new Date(d + 'T12:00:00Z').toLocaleDateString('fr-FR',
    {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

// Convertit l'heure UTC d'un match (date + "HH:MM" UTC) en heure de Paris.
// toLocaleTimeString avec timeZone gère automatiquement l'heure d'été/hiver.
function heureParis(date, timeUTC) {
  if (!date || !timeUTC || !/^\d{2}:\d{2}$/.test(timeUTC)) return timeUTC || '';
  const d = new Date(`${date}T${timeUTC}:00Z`);
  if (isNaN(d)) return timeUTC;
  return d.toLocaleTimeString('fr-FR',
    {hour:'2-digit', minute:'2-digit', timeZone:'Europe/Paris'});
}

// Renvoie la date Paris (YYYY-MM-DD) correspondant à un coup d'envoi UTC.
// Un match à 23:00 UTC tombe le lendemain à Paris (01:00) : on le classe au bon jour.
function dateParis(date, timeUTC) {
  if (!date) return date;
  const t = /^\d{2}:\d{2}$/.test(timeUTC) ? timeUTC : '12:00';
  const d = new Date(`${date}T${t}:00Z`);
  if (isNaN(d)) return date;
  return d.toLocaleDateString('en-CA', {timeZone:'Europe/Paris'}); // format YYYY-MM-DD
}

// ─── FETCH API ────────────────────────────────────────────────────────────────
async function fetchAll() {
  const spin = document.getElementById('spin');
  if (spin) spin.style.display = 'inline-block';
  setApiStatus('loading');

  let gamesOK = false;

  // 1) /games — la source critique. Try indépendant : un échec sur /groups
  //    ne doit pas faire passer toute l'appli "Hors ligne".
  try {
    const r = await fetch(`${PROXY}/games`, {cache:'no-store'});
    if (r.ok) {
      const data = await r.json();
      processGames(data);
      gamesOK = true;
    }
  } catch (e) { /* CORS ou réseau : on tentera le fallback plus bas */ }

  // 2) /groups — facultatif. Le classement est de toute façon recalculé
  //    depuis les scores des matchs dans processGames.
  try {
    const r = await fetch(`${PROXY}/groups`, {cache:'no-store'});
    if (r.ok) processGroups(await r.json());
  } catch (e) { /* non bloquant */ }

  // 3) Fallback openfootball uniquement si /games a échoué.
  if (!gamesOK) {
    try {
      const r = await fetch('https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json', {cache:'no-store'});
      if (r.ok) { processOpenfootball(await r.json()); setApiStatus('fallback'); }
      else setApiStatus('err');
    } catch { setApiStatus('err'); }
  } else {
    setApiStatus('ok');
  }

  if (spin) spin.style.display = 'none';
  const now = new Date();
  const lu = document.getElementById('lu');
  if (lu) lu.textContent = 'Mis à jour ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

  const badge = document.getElementById('live-badge');
  if (badge) badge.style.display = hasLiveMatches() ? 'block' : 'none';

  renderGroups();
  const active = document.querySelector('.section.active');
  if (active?.id === 'matchs') renderMatches();
  if (active?.id === 'stats')  renderStats();

  scheduleNext();
}

function scheduleNext() {
  clearTimeout(timer);
  timer = setTimeout(fetchAll, hasLiveMatches() ? REFRESH_LIVE : REFRESH_NORMAL);
}

function setApiStatus(s) {
  const dot = document.getElementById('api-dot');
  const lbl = document.getElementById('api-label');
  if (!dot || !lbl) return;
  const map = {
    loading:  ['#BA7517','Chargement…'],
    ok:       ['#3b9e3b','Live · CF Worker ✓'],
    fallback: ['#BA7517','openfootball (J-1)'],
    err:      ['#e24b4a','Hors ligne'],
  };
  const [color, text] = map[s] || map.err;
  dot.style.background = color;
  lbl.textContent = text;
}

// ─── TRAITEMENT DONNÉES worldcup26.ir ─────────────────────────────────────────
function processGames(data) {
  // L'API retourne un tableau de matchs
  const games = Array.isArray(data) ? data : (data.games || data.matches || []);
  resetStandings();
  live = {};
  matchScorers = {};

  games.forEach(g => {
    const grpRaw = g.group || g.stage || '';
    const grpMatch = String(grpRaw).match(/(?:group|groupe|grp|gr)\s*([A-L])\b/i) || String(grpRaw).match(/\b([A-L])\b/i);
    const grp = grpMatch ? grpMatch[1].toUpperCase() : null;
    if (!grp) return;

    // L'API worldcup26.ir fournit directement les noms (home_team_name_en).
    // On les utilise en priorité ; fallback sur la table d'ids puis autres champs.
    const home = g.home_team_name_en || apiTeamName(g.home_team_id ?? g.homeTeamId)
               || g.home_team?.name || g.homeTeam || g.home || '';
    const away = g.away_team_name_en || apiTeamName(g.away_team_id ?? g.awayTeamId)
               || g.away_team?.name || g.awayTeam || g.away || '';
    let hs = g.home_score ?? g.homeScore ?? g.home_goals ?? null;
    let as = g.away_score ?? g.awayScore ?? g.away_goals ?? null;
    // finished : l'API renvoie la string "TRUE"/"FALSE".
    const stRaw = String(g.status || '').toUpperCase();
    const elapsed = String(g.time_elapsed ?? '').toLowerCase();
    const finished = g.finished === true || String(g.finished).toUpperCase() === 'TRUE'
                  || g.finished === 1 || ['FT','AET','PEN','FINISHED'].includes(stRaw);
    // En cours : time_elapsed est une minute (ni "notstarted" ni vide ni "0").
    const inPlay = !finished && (
                   ['1H','2H','HT','ET','BT','LIVE','IN_PLAY','PAUSED'].includes(stRaw)
                   || (elapsed && elapsed !== 'notstarted' && elapsed !== '0' && elapsed !== 'null'));
    const status = finished ? 'FT' : inPlay ? (stRaw && stRaw !== 'IN_PLAY' ? stRaw : '1H') : 'NS';

    const found = findStaticMatch(grp, home, away);
    if (found) {
      const sm = found.match;
      // Si l'ordre API est inversé p/r au match statique, on permute les scores
      // pour qu'ils correspondent TOUJOURS à sm.home / sm.away.
      if (found.swap) { const t = hs; hs = as; as = t; }
      // Un score n'est affiché QUE si le match est terminé ou en cours.
      const showScore = (finished || inPlay) && hs !== null && as !== null;
      live[sm.id] = {
        hs: showScore ? Number(hs) : null,
        as: showScore ? Number(as) : null,
        status,
        minute: (inPlay && elapsed && elapsed !== 'notstarted') ? (g.minute || g.time_elapsed) : null,
      };
      // Buteurs : on passe les noms dans l'ordre STATIQUE (sm.home/sm.away) pour que
      // sideOf retourne le bon côté, et le flag swap pour réorienter les fallbacks.
      const gls = extractGoals(g, sm.home, sm.away, found.swap);
      if (gls.length) matchScorers[sm.id] = gls;
      if (finished && hs !== null && as !== null) {
        updateStandings(grp, sm.home, sm.away, Number(hs), Number(as), sm.id);
      }
    }
  });

  // Buteurs : on privilégie le classement officiel de l'API (top_scorers / scorers)
  // s'il existe — c'est lui qui contient les totaux complets (ex. Messi en tête).
  // Sinon, on recalcule à partir du détail des buteurs match par match.
  const apiTop = data.top_scorers || data.scorers || data.topScorers || data.top_scorer || null;
  if (Array.isArray(apiTop) && apiTop.length) {
    apiScorers = apiTop.slice(0, 30).map(s => ({
      name: s.player?.name || s.name || s.full_name || s.player || '—',
      team: s.team?.name || s.team || s.country || '',
      goals: s.goals ?? s.goal_count ?? s.goals_scored ?? s.total ?? 0,
      pens: s.penalties ?? s.pens ?? 0,
    })).filter(s => s.name && s.name !== '—');
  }
  rebuildScorers();
}

// Normalise les noms d'équipe API → nom interne (home/away du match statique)
function sideOf(scorerTeam, homeName, awayName) {
  if (!scorerTeam) return null;
  if (fuzzy(scorerTeam, homeName)) return 'home';
  if (fuzzy(scorerTeam, awayName)) return 'away';
  return null;
}

// Extrait la liste des buteurs d'un match, quel que soit le format de l'API.
// homeName/awayName sont dans l'ordre STATIQUE. swap=true => l'ordre API est inversé,
// donc les côtés bruts ('home'/'away' fournis par l'API) doivent être permutés.
function extractGoals(g, homeName, awayName, swap) {
  const out = [];
  const flip = s => swap ? (s === 'home' ? 'away' : s === 'away' ? 'home' : s) : s;
  const push = (name, side, minute, og, pen) => {
    if (!name) return;
    out.push({ name: String(name).trim(), team: side, minute: minute != null ? String(minute).replace(/['′]/g,'') : null, og: !!og, pen: !!pen });
  };

  // Format 1 : tableau d'événements (events / timeline / incidents)
  const evs = g.events || g.timeline || g.incidents || [];
  if (Array.isArray(evs) && evs.length) {
    evs.forEach(e => {
      const type = String(e.type || e.event || e.detail || '').toLowerCase();
      if (!type.includes('goal') && !type.includes('but')) return;
      const og = type.includes('own');
      const pen = type.includes('pen');
      const name = e.player?.name || e.player || e.scorer?.name || e.scorer || e.name;
      const teamName = e.team?.name || e.team || e.side;
      // sideOf compare aux noms statiques → déjà correct, pas de flip nécessaire.
      let side = sideOf(teamName, homeName, awayName);
      // Fallback sur le champ brut e.side (orientation API) → à permuter si swap.
      if (!side && (e.side === 'home' || e.side === 'away')) side = flip(e.side);
      push(name, side, e.minute ?? e.time ?? e.elapsed, og, pen);
    });
  }

  // Format 2 : champs séparés home_scorers / away_scorers.
  // worldcup26.ir les renvoie comme STRING façon "{\"H. Kane 12'(p)\",\"...\"}"
  // (ou la string "null"), pas comme tableau. On parse en liste de noms.
  const parseScorers = v => {
    if (Array.isArray(v)) return v;
    if (typeof v !== 'string') return [];
    let s = v.trim();
    if (!s || s === 'null' || s === '{}') return [];
    s = s.replace(/^\{/, '').replace(/\}$/, '');
    // Découpe UNIQUEMENT sur la virgule séparant deux entrées entre guillemets
    // (",") — surtout pas sur les apostrophes de minute (ex. 9'). Gère aussi les
    // guillemets typographiques " ".
    const parts = s.split(/"\s*,\s*"|”\s*,\s*“|"\s*,\s*“|”\s*,\s*"/);
    return parts.map(x => x.replace(/^[\s"“”]+|[\s"“”]+$/g, '').trim()).filter(Boolean);
  };
  const grab = (raw, side) => {
    parseScorers(raw).forEach(s => {
      const og  = /\(\s*og\s*\)/i.test(s);
      const pen = /\(\s*p\s*\)|\(\s*pen/i.test(s);
      const mMin = s.match(/(\d+(?:\+\d+)?)\s*['′]/);
      const minute = mMin ? mMin[1] : null;
      // Nom = tout avant la minute (premier groupe de chiffres suivi de ' ou ′).
      const name = s.replace(/\s*\d+(?:\+\d+)?\s*['′].*$/, '').replace(/\s*\(.*\)\s*$/, '').trim();
      push(name, side, minute, og, pen);
    });
  };
  if (!out.length) {
    grab(g.home_scorers ?? g.homeScorers ?? g.goals?.home, flip('home'));
    grab(g.away_scorers ?? g.awayScorers ?? g.goals?.away, flip('away'));
  }

  return out;
}

// Construit le classement affiché : priorité au classement officiel de l'API
// (apiScorers), sinon recalcul à partir du détail des buteurs match par match.
function rebuildScorers() {
  if (apiScorers.length) { scorers = apiScorers.slice(0, 20); return; }

  // Clé d'agrégation tolérante aux variantes de nom : l'API écrit le même joueur
  // tantôt "Kylian Mbappé", tantôt "K. Mbappé". On regroupe sur
  // initiale-du-prénom + nom-de-famille (dernier mot), accents/casse ignorés,
  // pour ne pas compter le même buteur deux fois.
  const norm = s => s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // retire accents
    .replace(/[.]/g, ' ').replace(/\s+/g, ' ').trim();
  const scorerKey = (name, team) => {
    const parts = norm(name).split(' ').filter(Boolean);
    if (!parts.length) return norm(name) + '|' + norm(team);
    const last = parts[parts.length - 1];
    const firstInit = parts.length > 1 ? parts[0][0] : '';
    return firstInit + '|' + last + '|' + norm(team);
  };
  // Score de complétude pour choisir le libellé d'affichage le plus riche
  // (on préfère "Kylian Mbappé" à "K. Mbappé").
  const fullness = n => (n.includes('.') ? 0 : 1) * 100 + n.length;

  const tally = {};
  Object.entries(matchScorers).forEach(([mid, gls]) => {
    const sm = STATIC_MATCHES.find(m => m.id === mid);
    if (!sm) return;
    gls.forEach(gl => {
      if (gl.og) return; // les CSC ne comptent pas pour le buteur
      const teamName = gl.team === 'home' ? sm.home : gl.team === 'away' ? sm.away : '';
      const key = scorerKey(gl.name, teamName);
      if (!tally[key]) tally[key] = { name: gl.name, team: teamName, goals: 0, pens: 0 };
      else if (fullness(gl.name) > fullness(tally[key].name)) tally[key].name = gl.name;
      tally[key].goals++;
      if (gl.pen) tally[key].pens++;
    });
  });
  scorers = Object.values(tally)
    .sort((a, b) => b.goals - a.goals || a.name.localeCompare(b.name))
    .slice(0, 20);
}

function processGroups(data) {
  // Le classement est recalculé de façon fiable depuis les scores des matchs
  // (updateStandings). L'API /groups ne sert que de FALLBACK : on ne l'applique
  // qu'aux équipes dont aucun match n'a encore alimenté le classement (pj===0),
  // pour ne jamais écraser un calcul correct. Toutes les valeurs sont forcées
  // en nombre (l'API renvoie parfois des strings comme "0").
  const num = v => { const n = Number(v); return Number.isFinite(n) ? n : 0; };
  const groups = Array.isArray(data) ? data : (data.groups || []);
  groups.forEach(g => {
    const grpMatch = (g.name || g.group || '').match(/(?:group|groupe|grp|gr)\s*([A-L])\b/i) || (g.name || g.group || '').match(/\b([A-L])\b/i);
    const grp = grpMatch ? grpMatch[1].toUpperCase() : null;
    if (!grp || !standings[grp]) return;
    const teams = g.teams || g.standings || [];
    teams.forEach((t) => {
      const name = t.team?.name || t.name || '';
      const s = standings[grp].find(x => fuzzy(x.name, name));
      if (!s) return;
      // Si des matchs ont déjà été comptés pour cette équipe, on garde le recalcul.
      if (s.pj > 0) return;
      s.pts  = num(t.points ?? t.pts);
      s.pj   = num(t.played ?? t.pj);
      s.v    = num(t.won ?? t.v);
      s.n    = num(t.drawn ?? t.n);
      s.d    = num(t.lost ?? t.d);
      s.bp   = num(t.goals_for ?? t.bp);
      s.bc   = num(t.goals_against ?? t.bc);
      s.diff = (t.goal_diff != null) ? num(t.goal_diff) : (s.bp - s.bc);
    });
  });
}

// Fallback openfootball (mise à jour 1×/jour)
// Format réel : { name, matches: [ {round, date, time, team1, team2, group:"Group A",
//                ground, score1?, score2?, score?:{ft:[h,a]}} ] }
function processOpenfootball(data) {
  // Supporte les deux formats : matches à plat OU rounds imbriqués
  let flat = [];
  if (Array.isArray(data?.matches)) {
    flat = data.matches;
  } else if (Array.isArray(data?.rounds)) {
    data.rounds.forEach(r => (r.matches || []).forEach(m => {
      flat.push({...m, group: m.group || r.name});
    }));
  }
  if (!flat.length) return;

  resetStandings();
  live = {};
  matchScorers = {};
  flat.forEach(m => {
    const gm = String(m.group || '').match(/([A-L])\b/i);
    const grp = gm ? gm[1].toUpperCase() : null;
    if (!grp) return;

    const home = typeof m.team1 === 'string' ? m.team1 : (m.team1?.name || '');
    const away = typeof m.team2 === 'string' ? m.team2 : (m.team2?.name || '');

    // Score : score1/score2, score.ft:[h,a], ou "2-1" en chaîne
    let hs = null, as = null;
    if (m.score1 !== undefined && m.score1 !== null) { hs = +m.score1; as = +m.score2; }
    else if (Array.isArray(m.score?.ft)) { hs = +m.score.ft[0]; as = +m.score.ft[1]; }
    else if (typeof m.score === 'string') {
      const p = m.score.split('-').map(x => parseInt(x.trim()));
      if (p.length === 2 && !isNaN(p[0])) { hs = p[0]; as = p[1]; }
    }
    if (hs === null || isNaN(hs) || isNaN(as)) return; // match pas encore joué

    const sm = findStaticMatch(grp, home, away);
    if (!sm) return;
    live[sm.id] = {hs, as, status:'FT', minute:null};
    updateStandings(grp, sm.home, sm.away, hs, as, sm.id);

    // openfootball : goals1/goals2 = [{name, minute, owngoal?, penalty?}]
    const gls = [];
    (m.goals1 || []).forEach(x => gls.push({name:x.name||x.player, team:'home', minute:x.minute, og:x.owngoal||x.og, pen:x.penalty||x.pen}));
    (m.goals2 || []).forEach(x => gls.push({name:x.name||x.player, team:'away', minute:x.minute, og:x.owngoal||x.og, pen:x.penalty||x.pen}));
    if (gls.length) matchScorers[sm.id] = gls;
  });
  rebuildScorers();
}

// ─── RENDU GROUPES ────────────────────────────────────────────────────────────
function renderGroups() {
  const grid = document.getElementById('groups-grid');
  if (!grid) return;
  grid.innerHTML = '';
  Object.entries(standings).forEach(([grp, teams]) => {
    const sorted = [...teams].sort((a,b) => b.pts - a.pts || b.diff - a.diff || b.bp - a.bp);
    const rows = sorted.map((t, i) => {
      const cls = i < 2 ? 'q1' : i === 2 ? 'q3' : '';
      return `<tr class="${cls}">
        <td class="pos">${i+1}</td>
        <td><span class="flag">${F(t.name)}</span>${t.name}</td>
        <td class="num">${t.pj}</td><td class="num">${t.v}</td>
        <td class="num">${t.n}</td><td class="num">${t.d}</td>
        <td class="num">${t.bp}:${t.bc}</td>
        <td class="pts">${t.pts}</td>
      </tr>`;
    }).join('');
    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-header">
        <span class="group-label">Groupe ${grp}</span>
        <span style="font-size:15px">${GRP[grp].map(F).join(' ')}</span>
      </div>
      <table class="standings-table">
        <thead><tr>
          <th></th><th>Équipe</th>
          <th class="num">MJ</th><th class="num">V</th>
          <th class="num">N</th><th class="num">D</th>
          <th class="num">Buts</th><th class="pts">Pts</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    grid.appendChild(card);
  });
}

// ─── RENDU MATCHS ─────────────────────────────────────────────────────────────
function renderMatches() {
  const grpF   = document.getElementById('fg')?.value || '';
  const stF    = document.getElementById('fs')?.value || '';
  const teamF  = (document.getElementById('ft')?.value || '').toLowerCase();
  const mc     = document.getElementById('mc');
  if (!mc) return;

  const filtered = STATIC_MATCHES.filter(m => {
    if (grpF && m.grp !== grpF) return false;
    const st = live[m.id]?.status || 'NS';
    if (stF === 'LIVE' && !['1H','2H','HT','ET','BT','LIVE'].includes(st)) return false;
    if (stF === 'FT'   && st !== 'FT')  return false;
    if (stF === 'NS'   && st !== 'NS')  return false;
    if (teamF && !m.home.toLowerCase().includes(teamF) && !m.away.toLowerCase().includes(teamF)) return false;
    return true;
  });

  if (!filtered.length) {
    mc.innerHTML = '<div class="no-data">Aucun match avec ces filtres.</div>';
    return;
  }

  const byDate = {};
  filtered.forEach(m => {
    const dp = dateParis(m.date, m.time);
    (byDate[dp] = byDate[dp] || []).push(m);
  });
  // Tri des matchs d'un même jour par heure de Paris (chronologique).
  Object.values(byDate).forEach(ms => ms.sort((a,b) =>
    heureParis(a.date, a.time).localeCompare(heureParis(b.date, b.time))));

  mc.innerHTML = Object.entries(byDate).sort().map(([date, ms]) => {
    const cards = ms.map(m => {
      const ld = live[m.id] || {};
      const hs = ld.hs !== undefined ? ld.hs : null;
      const as = ld.as !== undefined ? ld.as : null;
      const st = ld.status || 'NS';
      // Garde-fou : un match "terminé" sans score remonté ne doit pas afficher
      // "Terminé" (sinon affichage trompeur "- : -" en vert). On le repasse à venir.
      const stSafe = (st === 'FT' && (hs === null || as === null)) ? 'NS' : st;
      const {cls, txt} = statusLabel(stSafe);
      const isLive = ['1H','2H','HT','ET','BT','LIVE'].includes(stSafe);
      const hasGoals = (matchScorers[m.id] || []).length > 0;
      const played = stSafe === 'FT' || isLive;
      const hint = played
        ? `<div class="tap-hint"><i class="ti ti-list-details"></i> ${hasGoals ? 'Voir les buteurs' : 'Détails du match'}</div>`
        : `<div class="tap-hint"><i class="ti ti-clock"></i> ${heureParis(m.date, m.time)} · à venir</div>`;
      return `<div class="match-card ${isLive ? 'live' : ''}" onclick="openMatch('${m.id}')">
        <div class="team-side">
          <div class="team-fn"><span class="tf">${F(m.home)}</span>${m.home}</div>
        </div>
        <div class="score-box">
          <div class="score">${hs !== null ? hs : '-'}&nbsp;:&nbsp;${as !== null ? as : '-'}</div>
          <div class="meta">Gr.${m.grp} · ${m.venue}</div>
          <div class="meta">${heureParis(m.date, m.time)}</div>
          <span class="st-badge ${cls}">${txt}${ld.minute ? ' ' + ld.minute + "'" : ''}</span>
        </div>
        <div class="team-side right">
          <div class="team-fn right">${m.away}<span class="tf">${F(m.away)}</span></div>
        </div>
        ${hint}
      </div>`;
    }).join('');
    return `<div class="match-day-hdr">${fmtDate(date)}</div>${cards}`;
  }).join('');
}

// ─── RENDU KNOCKOUT ───────────────────────────────────────────────────────────
function renderKnockout() {
  const grid = document.getElementById('ko-grid');
  if (!grid) return;
  grid.innerHTML = KO.map(round => `
    <div>
      <div class="ko-col-title">${round.name}</div>
      ${round.matches.map(m => `
        <div class="ko-match">
          <div class="ko-team"><span>${m.h}</span><span class="ko-score">-</span></div>
          <div class="ko-team"><span>${m.a}</span><span class="ko-score">-</span></div>
          <div class="ko-date">${round.dates}</div>
        </div>`).join('')}
    </div>`).join('');
}

// ─── RENDU STATS ──────────────────────────────────────────────────────────────
function renderStats() {
  const played = STATIC_MATCHES.filter(m => live[m.id]?.status === 'FT').length;
  const inPlay = STATIC_MATCHES.filter(m => ['1H','2H','HT','ET','BT','LIVE'].includes(live[m.id]?.status)).length;
  let goals = 0;
  STATIC_MATCHES.forEach(m => {
    if (live[m.id]?.status === 'FT') goals += (live[m.id].hs || 0) + (live[m.id].as || 0);
  });
  const avg = played > 0 ? (goals / played).toFixed(2) : '—';

  const sg = document.getElementById('sg');
  if (sg) sg.innerHTML = `
    <div class="stat-card"><div class="stat-val">${STATIC_MATCHES.length}</div><div class="stat-lbl">Matchs (groupes)</div></div>
    <div class="stat-card"><div class="stat-val">${played}</div><div class="stat-lbl">Joués</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#e24b4a">${inPlay}</div><div class="stat-lbl">En direct</div></div>
    <div class="stat-card"><div class="stat-val">${goals}</div><div class="stat-lbl">Buts marqués</div></div>
    <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-lbl">Buts / match</div></div>
    <div class="stat-card"><div class="stat-val">48</div><div class="stat-lbl">Nations</div></div>
    <div class="stat-card"><div class="stat-val">104</div><div class="stat-lbl">Total matchs</div></div>
    <div class="stat-card"><div class="stat-val">16</div><div class="stat-lbl">Villes hôtes</div></div>`;

  const sl = document.getElementById('sl');
  if (!sl) return;
  if (!scorers.length) {
    sl.innerHTML = played === 0
      ? '<div class="no-data">Les stats de buteurs apparaîtront après les premiers matchs.</div>'
      : '<div class="no-data">Données buteurs non disponibles sur cette source.</div>';
    return;
  }
  sl.innerHTML = scorers.map((s, i) => {
    const nm = s.name || s.player?.name || '—';
    const tm = s.team?.name || s.team || '';
    const g  = s.goals != null ? s.goals : (s.goal_count || 0);
    const pens = s.pens ? ` · ${s.pens} pen.` : '';
    return `
    <div class="scorer-row">
      <div class="s-rank ${i < 3 ? 'gold' : ''}">${i + 1}</div>
      <div class="s-info">
        <div class="s-name">${nm}</div>
        <div class="s-team">${F(tm)} ${tm}${pens}</div>
      </div>
      <div class="s-goals">${g}<span> buts</span></div>
    </div>`;
  }).join('');
}

// ─── MODAL DÉTAIL MATCH ───────────────────────────────────────────────────────
function openMatch(id) {
  const m = STATIC_MATCHES.find(x => x.id === id);
  if (!m) return;
  const ld = live[id] || {};
  const st = ld.status || 'NS';
  const {cls, txt} = statusLabel(st);
  const isLive = ['1H','2H','HT','ET','BT','LIVE'].includes(st);
  const hs = ld.hs != null ? ld.hs : '-';
  const as = ld.as != null ? ld.as : '-';
  const played = st === 'FT' || isLive;

  const gls = (matchScorers[id] || []).slice().sort((a,b) => (parseInt(a.minute)||999) - (parseInt(b.minute)||999));
  const tag = gl => (gl.pen ? ' (pen.)' : '') + (gl.og ? ' (csc)' : '');
  const homeRows = gls.filter(g => g.team === 'home').map(g =>
    `<div class="gl-row"><span class="gl-icon">⚽</span><span class="gl-nm">${g.name}${tag(g)}</span><span class="gl-min">${g.minute ? g.minute + "'" : ''}</span></div>`).join('');
  const awayRows = gls.filter(g => g.team === 'away').map(g =>
    `<div class="gl-row away"><span class="gl-icon">⚽</span><span class="gl-nm">${g.name}${tag(g)}</span><span class="gl-min">${g.minute ? g.minute + "'" : ''}</span></div>`).join('');

  let body;
  if (!played) {
    body = `<div class="gl-empty">Match à venir.<br>Coup d'envoi : ${fmtDate(m.date)} à ${heureParis(m.date, m.time)}.</div>`;
  } else if (!gls.length) {
    body = `<div class="gl-empty">${(hs===0&&as===0)?'Aucun but pour le moment (0-0).':'Buteurs non disponibles sur la source de données pour ce match.'}</div>`;
  } else {
    const col = (rows, name, flag) => `<div><div class="gl-section-t">${flag} ${name}</div><div class="gl-list">${rows || '<div class="gl-empty" style="padding:6px 0">—</div>'}</div></div>`;
    body = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">${col(homeRows, m.home, F(m.home))}${col(awayRows, m.away, F(m.away))}</div>`;
  }

  document.getElementById('match-modal-box').innerHTML = `
    <div class="modal-hd">
      <button class="modal-x" onclick="closeMatch()">✕</button>
      <div class="modal-meta">Groupe ${m.grp} · ${m.venue} · ${heureParis(m.date, m.time)}</div>
      <div class="modal-teams">
        <div class="mt-side"><div class="mt-fl">${F(m.home)}</div><div class="mt-nm">${m.home}</div></div>
        <div class="mt-score">${hs} : ${as}</div>
        <div class="mt-side"><div class="mt-fl">${F(m.away)}</div><div class="mt-nm">${m.away}</div></div>
      </div>
      <div class="modal-st"><span class="st-badge ${cls}">${txt}${ld.minute ? ' ' + ld.minute + "'" : ''}</span></div>
    </div>
    <div class="modal-bd">
      <div class="gl-section-t" style="margin-bottom:12px">⚽ Buteurs</div>
      ${body}
    </div>`;
  document.getElementById('match-modal').classList.add('open');
}

function closeMatch() {
  document.getElementById('match-modal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMatch(); });

// ─── NAVIGATION ONGLETS ───────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['groupes','matchs','knockout','stats'][i] === id);
  });
  document.querySelectorAll('.section').forEach(s => {
    s.classList.toggle('active', s.id === id);
  });
  if (id === 'matchs')   renderMatches();
  if (id === 'knockout') renderKnockout();
  if (id === 'stats')    renderStats();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderGroups();
renderMatches();
renderKnockout();
fetchAll();
</script>
