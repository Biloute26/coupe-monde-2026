<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde FIFA 2026 — Planning interactif</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a2e;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:16px}
.wc-header{background:#0A1628;color:#fff;padding:20px 24px;border-radius:14px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.wc-title{font-size:22px;font-weight:700}
.wc-subtitle{font-size:13px;opacity:.65;margin-top:3px}
.wc-ball{font-size:36px}
.wc-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.live-badge{background:#e24b4a;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;animation:pulse 1.5s infinite;display:none}
.api-status{font-size:11px;opacity:.6;display:flex;align-items:center;gap:5px}
.api-dot{width:7px;height:7px;border-radius:50%;background:#3b9e3b}
.api-dot.err{background:#e24b4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tabs{display:flex;background:#fff;border:1px solid #e0e3ea;border-radius:10px;overflow:hidden;margin-bottom:16px}
.tab{flex:1;padding:10px 6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#777;border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:#0A1628;border-bottom:2px solid #0A1628;background:#fff}
.tab:hover:not(.active){background:#f8f9fb}
.section{display:none}.section.active{display:block}

/* Groupes */
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#777;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px}
.ld{width:10px;height:10px;border-radius:2px}
.ld-q{background:#3b9e3b}.ld-3{background:#378ADD}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.group-card{background:#fff;border:1px solid #e0e3ea;border-radius:12px;overflow:hidden}
.group-header{background:#0A1628;color:#fff;padding:9px 14px;display:flex;justify-content:space-between;align-items:center}
.group-label{font-size:15px;font-weight:700}
.standings-table{width:100%;border-collapse:collapse;font-size:12px}
.standings-table th{padding:5px 8px;text-align:left;color:#888;font-weight:500;border-bottom:1px solid #f0f1f3;background:#f8f9fb;font-size:11px}
.standings-table td{padding:5px 8px;border-bottom:1px solid #f0f1f3}
.standings-table tr:last-child td{border-bottom:none}
.standings-table .pos{width:20px;color:#aaa;font-weight:700}
.standings-table .flag{font-size:17px;margin-right:4px}
.standings-table .num{text-align:center;width:28px;color:#555}
.standings-table .pts{text-align:center;width:32px;font-weight:700;color:#0A1628}
.standings-table tr.q1{background:#f0f9f0}
.standings-table tr.q1 td:first-child{border-left:3px solid #3b9e3b}
.standings-table tr.q3{background:#eef4fd}
.standings-table tr.q3 td:first-child{border-left:3px solid #378ADD}

/* Matchs */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.filter-bar select,.filter-bar input{font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid #dde;background:#fff;color:#1a1a2e;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:#378ADD}
.refresh-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:1px solid #dde;background:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s;margin-left:auto}
.refresh-btn:hover{background:#f0f4fb;border-color:#378ADD}
.last-upd{font-size:11px;color:#aaa}
.match-day-hdr{font-size:11px;font-weight:700;color:#888;padding:10px 0 5px;border-bottom:1px solid #eee;margin-top:10px;text-transform:uppercase;letter-spacing:.6px}
.match-card{background:#fff;border:1px solid #e0e3ea;border-radius:10px;padding:11px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-top:6px;transition:.15s}
.match-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.match-card.live{border-color:#e24b4a;border-width:1.5px;background:#fffafa}
.team-side{display:flex;flex-direction:column;align-items:flex-start}
.team-side.right{align-items:flex-end}
.team-fn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}
.team-fn.right{flex-direction:row-reverse}
.tf{font-size:19px}
.score-box{text-align:center}
.score{font-size:22px;font-weight:700;letter-spacing:3px;color:#0A1628}
.meta{font-size:11px;color:#aaa;text-align:center;margin-top:2px}
.st-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
.st-live{background:#fde8e8;color:#c0392b}
.st-ft{background:#e8f5e9;color:#2e7d32}
.st-ns{background:#f5f5f5;color:#888}
.st-ht{background:#fff3e0;color:#e65100}

/* Knockout */
.ko-wrap{overflow-x:auto;padding-bottom:8px}
.ko-grid{display:grid;grid-template-columns:repeat(5,190px);gap:12px;min-width:970px}
.ko-col-title{font-size:11px;font-weight:700;color:#0A1628;text-align:center;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e0e3ea;text-transform:uppercase;letter-spacing:.5px}
.ko-match{background:#fff;border:1px solid #e0e3ea;border-radius:8px;padding:7px 10px;margin-bottom:8px}
.ko-team{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;color:#444}
.ko-score{font-size:12px;font-weight:700;color:#0A1628;min-width:14px;text-align:center}
.ko-date{font-size:10px;color:#bbb;text-align:center;margin-top:4px;border-top:1px solid #f5f5f5;padding-top:3px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e0e3ea;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:28px;font-weight:700;color:#0A1628}
.stat-lbl{font-size:11px;color:#888;margin-top:4px;font-weight:500}
.scorers-title{font-size:12px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.scorer-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid #e0e3ea;border-radius:10px;margin-bottom:6px}
.s-rank{font-size:18px;font-weight:700;color:#ccc;width:24px;text-align:center}
.s-rank.gold{color:#f0a500}
.s-info{flex:1}
.s-name{font-size:13px;font-weight:600}
.s-team{font-size:11px;color:#aaa}
.s-goals{font-size:22px;font-weight:700;color:#0A1628}
.s-goals span{font-size:11px;color:#aaa;font-weight:400}
.no-data{text-align:center;padding:24px;color:#aaa;font-size:13px;background:#fff;border:1px solid #e0e3ea;border-radius:10px}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid #dde;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .groups-grid{grid-template-columns:1fr}
  .wc-title{font-size:17px}
  .ko-grid{grid-template-columns:repeat(5,148px)}

</style>
</head>

  {id:'m70',date:'2026-06-27',time:'23:30',grp:'K',home:'DR Congo',away:'Uzbekistan',venue:'Atlanta'},
  {id:'m71',date:'2026-06-28',time:'02:00',grp:'J',home:'Algeria',away:'Austria',venue:'Kansas City'},
  {id:'m72',date:'2026-06-28',time:'02:00',grp:'J',home:'Jordan',away:'Argentina',venue:'Dallas'},
];

const KO = [
  {name:'Huitièmes',dates:'28 juin–3 juil.',matches:[
    {h:'1A',a:'3e C/D/F/G/H'},{h:'1C',a:'3e A/E/F/H/I'},
    {h:'1B',a:'3e E/G/I/J/K'},{h:'1F',a:'3e A/B/C/D'},
    {h:'1E',a:'3e C/D/F/G/H'},{h:'1D',a:'3e D/E/F/G/I'},
    {h:'1G',a:'3e A/E/H/I/J'},{h:'1K',a:'3e D/E/I/J/L'},
    {h:'1H',a:'3e A/B/E/F/G'},{h:'1I',a:'3e H/J/K/L'},
    {h:'2B',a:'2F'},{h:'2A',a:'2C'},
    {h:'2E',a:'2G'},{h:'2D',a:'2J'},
    {h:'2H',a:'2L'},{h:'2K',a:'2I'},
  ]},
  {name:'Quarts',dates:'9–11 juil.',matches:[
    {h:'W1',a:'W2'},{h:'W3',a:'W4'},{h:'W5',a:'W6'},{h:'W7',a:'W8'},
    {h:'W9',a:'W10'},{h:'W11',a:'W12'},{h:'W13',a:'W14'},{h:'W15',a:'W16'},
  ]},
  {name:'Demies',dates:'14–15 juil.',matches:[
    {h:'QF1',a:'QF2'},{h:'QF3',a:'QF4'},{h:'QF5',a:'QF6'},{h:'QF7',a:'QF8'},
  ]},
  {name:'Petite finale',dates:'18 juil.',matches:[{h:'3e A',a:'3e B'}]},
  {name:'🏆 Finale',dates:'19 juil. · New York',matches:[{h:'SF1',a:'SF2'}]},
];

// ─── ÉTAT ─────────────────────────────────────────────────────────────────────
let live = {};      // {matchId: {hs, as, status, minute}}
let standings = {}; // classements calculés
let scorers = [];   // buteurs depuis l'API
let timer = null;

function resetStandings() {
  Object.entries(GRP).forEach(([g,teams]) => {
    standings[g] = teams.map(t => ({name:t,pts:0,pj:0,v:0,n:0,d:0,bp:0,bc:0,diff:0,seen:new Set()}));
  });
}
resetStandings();

// ─── UTILITAIRES ──────────────────────────────────────────────────────────────
const F = t => FLAGS[t] || '🏳️';

const ALIAS = {
  'czechrepublic':'czechia','unitedstates':'usa','turkiye':'turkey',
  'cotedivoire':'ivorycoast','congodr':'drcongo','drc':'drcongo',
  'democraticrepublicofcongo':'drcongo','capoverde':'capeverde','caboverde':'capeverde',
  'koreaprepublic':'southkorea','korearepublic':'southkorea','irir':'iran'
};
// Normalise un nom d'équipe en clé canonique (gère accents + alias)
function teamKey(s) {
  let x = (s || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // retire accents
    .replace(/[^a-z]/g, '');
  return ALIAS[x] || x;
}
// Égalité STRICTE entre deux noms d'équipe (plus de includes() permissif)
function sameTeam(a, b) {
  return teamKey(a) === teamKey(b);
}
// fuzzy conservé pour compat éventuelle, mais strict désormais
function fuzzy(a, b) { return sameTeam(a, b); }

// Identifie LE match statique : les DEUX équipes doivent correspondre.
// Tolère l'inversion d'ordre (ESPN peut intervertir home/away).
function findStaticMatch(grp, home, away) {
  return STATIC_MATCHES.find(m =>
    m.grp === grp &&
    ((sameTeam(m.home, home) && sameTeam(m.away, away)) ||
     (sameTeam(m.home, away) && sameTeam(m.away, home)))
  ) || null;
}

function findTeamInGroup(grp, name) {
  return standings[grp]?.find(t => sameTeam(t.name, name));
}

// hs/as sont TOUJOURS dans l'ordre (home statique, away statique) du match identifié.
function updateStandings(grp, home, away, hs, as, key) {
  const h = findTeamInGroup(grp, home);
  const a = findTeamInGroup(grp, away);
  if (!h || !a || h === a) return;
  if (h.seen.has(key) || a.seen.has(key)) return;
  h.seen.add(key); a.seen.add(key);
  h.pj++; a.pj++;
  h.bp += hs; h.bc += as; h.diff = h.bp - h.bc;
  a.bp += as; a.bc += hs; a.diff = a.bp - a.bc;
  if (hs > as)      { h.v++; h.pts += 3; a.d++; }
  else if (as > hs) { a.v++; a.pts += 3; h.d++; }
  else              { h.n++; h.pts++;    a.n++; a.pts++; }
}

function fmtDate(d) {
  return new Date(d + 'T12:00:00Z').toLocaleDateString('fr-FR',
    {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

function statusLabel(st) {
  if (['1H','2H','ET','BT','LIVE'].includes(st)) return {cls:'st-live', txt:'EN DIRECT'};
  if (st === 'HT')  return {cls:'st-ht',  txt:'MI-TEMPS'};
  if (['FT','AET','PEN'].includes(st)) return {cls:'st-ft', txt:'Terminé'};
  return {cls:'st-ns', txt:'À venir'};
}

function hasLiveMatches() {
  return STATIC_MATCHES.some(m => ['1H','2H','HT','ET','BT','LIVE'].includes(live[m.id]?.status));
}

// ─── FETCH API ────────────────────────────────────────────────────────────────
async function fetchAll() {
  const spin = document.getElementById('spin');
  if (spin) spin.style.display = 'inline-block';
  setApiStatus('loading');

  try {
    const r = await fetch(ESPN + '&_=' + Date.now());
    if (!r.ok) throw new Error('ESPN ' + r.status);
    const data = await r.json();
    processESPN(data);
    setApiStatus('ok');
  } catch (e) {
    // Fallback openfootball
    try {
      const r = await fetch('https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json');
      if (r.ok) {
        const d = await r.json();
        processOpenfootball(d);
        setApiStatus('fallback');
      } else { setApiStatus('err'); }
    } catch { setApiStatus('err'); }
  }

  if (spin) spin.style.display = 'none';
  const now = new Date();
  const lu = document.getElementById('lu');
  if (lu) lu.textContent = 'Mis à jour ' + now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

  // Badge EN DIRECT
  const badge = document.getElementById('live-badge');
  if (badge) badge.style.display = hasLiveMatches() ? 'block' : 'none';

  // Re-render
  renderGroups();
  const active = document.querySelector('.section.active');
  if (active?.id === 'matchs') renderMatches();
  if (active?.id === 'stats')  renderStats();

  // Ajuste l'intervalle selon matchs en direct
  scheduleNext();
}

function scheduleNext() {
  clearTimeout(timer);
  timer = setTimeout(fetchAll, hasLiveMatches() ? REFRESH_LIVE : REFRESH_NORMAL);
}

function setApiStatus(s) {
  const dot = document.getElementById('api-dot');
  const lbl = document.getElementById('api-label');
  if (!dot || !lbl) return;
  const map = {
    loading:  ['#BA7517','Chargement…'],
    ok:       ['#3b9e3b','Live · ESPN ✓'],
    fallback: ['#BA7517','openfootball (J-1)'],
    err:      ['#e24b4a','Hors ligne'],
  };
  const [color, text] = map[s] || map.err;
  dot.style.background = color;
  lbl.textContent = text;
}

// ─── TRAITEMENT DONNÉES ESPN ──────────────────────────────────────────────────
// Structure : { events: [ { competitions: [ { status:{type:{state,detail}, displayClock},
//               competitors: [ {homeAway, score, team:{displayName}} ] } ] } ] }
function findGroupOfTeam(name) {
  for (const [g, teams] of Object.entries(GRP)) {
    if (teams.some(t => fuzzy(t, name))) return g;
  }
  return null;
}

function processESPN(data) {
  const events = data?.events || [];
  if (!events.length) return;
  resetStandings();
  live = {};

  events.forEach(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return;
    const homeC = comp.competitors?.find(c => c.homeAway === 'home');
    const awayC = comp.competitors?.find(c => c.homeAway === 'away');
    if (!homeC || !awayC) return;

    const home = homeC.team?.displayName || '';
    const away = awayC.team?.displayName || '';
    const state = comp.status?.type?.state || 'pre';     // pre | in | post
    const detail = comp.status?.type?.detail || '';
    const clock = comp.status?.displayClock || '';

    // Groupe déduit des équipes (l'API ne le fournit pas toujours)
    const grp = findGroupOfTeam(home) || findGroupOfTeam(away);
    if (!grp) return; // match à élimination directe ou équipe inconnue

    const sm = findStaticMatch(grp, home, away);
    if (!sm) return;

    if (state === 'pre') {
      live[sm.id] = {hs: null, as: null, status: 'NS', minute: null};
      return;
    }

    const hs = parseInt(homeC.score, 10);
    const as = parseInt(awayC.score, 10);
    if (isNaN(hs) || isNaN(as)) return;

    // ESPN peut donner les équipes dans un ordre différent du calendrier statique.
    // On réaligne les scores sur l'ordre (sm.home, sm.away).
    let HS = hs, AS = as;
    if (!sameTeam(sm.home, home)) { HS = as; AS = hs; }

    if (state === 'post') {
      live[sm.id] = {hs: HS, as: AS, status: 'FT', minute: null};
      updateStandings(grp, sm.home, sm.away, HS, AS, sm.id);
    } else { // in
      const isHT = /halftime/i.test(detail);
      live[sm.id] = {
        hs: HS, as: AS,
        status: isHT ? 'HT' : 'LIVE',
        minute: clock ? clock.replace("'", '') : null,
      };
    }
  });
}

// Fallback openfootball (mise à jour 1×/jour)
// Format réel : { name, matches: [ {round, date, time, team1, team2, group:"Group A",
//                ground, score1?, score2?, score?:{ft:[h,a]}} ] }
function processOpenfootball(data) {
  // Supporte les deux formats : matches à plat OU rounds imbriqués
  let flat = [];
  if (Array.isArray(data?.matches)) {
    flat = data.matches;
  } else if (Array.isArray(data?.rounds)) {
    data.rounds.forEach(r => (r.matches || []).forEach(m => {
      flat.push({...m, group: m.group || r.name});
    }));
  }
  if (!flat.length) return;

  resetStandings();
  live = {};
  flat.forEach(m => {
    const gm = String(m.group || '').match(/([A-L])\b/i);
    const grp = gm ? gm[1].toUpperCase() : null;
    if (!grp) return;

    const home = typeof m.team1 === 'string' ? m.team1 : (m.team1?.name || '');
    const away = typeof m.team2 === 'string' ? m.team2 : (m.team2?.name || '');

    // Score : score1/score2, score.ft:[h,a], ou "2-1" en chaîne
    let hs = null, as = null;
    if (m.score1 !== undefined && m.score1 !== null) { hs = +m.score1; as = +m.score2; }
    else if (Array.isArray(m.score?.ft)) { hs = +m.score.ft[0]; as = +m.score.ft[1]; }
    else if (typeof m.score === 'string') {
      const p = m.score.split('-').map(x => parseInt(x.trim()));
      if (p.length === 2 && !isNaN(p[0])) { hs = p[0]; as = p[1]; }
    }
    if (hs === null || isNaN(hs) || isNaN(as)) return; // match pas encore joué

    const sm = findStaticMatch(grp, home, away);
    if (!sm) return;
    live[sm.id] = {hs, as, status:'FT', minute:null};
    updateStandings(grp, sm.home, sm.away, hs, as, sm.id);
  });
}

// ─── RENDU GROUPES ────────────────────────────────────────────────────────────
function renderGroups() {
  const grid = document.getElementById('groups-grid');
  if (!grid) return;
  grid.innerHTML = '';
  Object.entries(standings).forEach(([grp, teams]) => {
    const sorted = [...teams].sort((a,b) => b.pts - a.pts || b.diff - a.diff || b.bp - a.bp);
    const rows = sorted.map((t, i) => {
      const cls = i < 2 ? 'q1' : i === 2 ? 'q3' : '';
      return `<tr class="${cls}">
        <td class="pos">${i+1}</td>
        <td><span class="flag">${F(t.name)}</span>${t.name}</td>
        <td class="num">${t.pj}</td><td class="num">${t.v}</td>
        <td class="num">${t.n}</td><td class="num">${t.d}</td>
        <td class="num">${t.bp}:${t.bc}</td>
        <td class="pts">${t.pts}</td>
      </tr>`;
    }).join('');
    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-header">
        <span class="group-label">Groupe ${grp}</span>
        <span style="font-size:15px">${GRP[grp].map(F).join(' ')}</span>
      </div>
      <table class="standings-table">
        <thead><tr>
          <th></th><th>Équipe</th>
          <th class="num">MJ</th><th class="num">V</th>
          <th class="num">N</th><th class="num">D</th>
          <th class="num">Buts</th><th class="pts">Pts</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    grid.appendChild(card);
  });
}

// ─── RENDU MATCHS ─────────────────────────────────────────────────────────────
function renderMatches() {
  const grpF   = document.getElementById('fg')?.value || '';
  const stF    = document.getElementById('fs')?.value || '';
  const teamF  = (document.getElementById('ft')?.value || '').toLowerCase();
  const mc     = document.getElementById('mc');
  if (!mc) return;

  const filtered = STATIC_MATCHES.filter(m => {
    if (grpF && m.grp !== grpF) return false;
    const st = live[m.id]?.status || 'NS';
    if (stF === 'LIVE' && !['1H','2H','HT','ET','BT','LIVE'].includes(st)) return false;
    if (stF === 'FT'   && st !== 'FT')  return false;
    if (stF === 'NS'   && st !== 'NS')  return false;
    if (teamF && !m.home.toLowerCase().includes(teamF) && !m.away.toLowerCase().includes(teamF)) return false;
    return true;
  });

  if (!filtered.length) {
    mc.innerHTML = '<div class="no-data">Aucun match avec ces filtres.</div>';
    return;
  }

  const byDate = {};
  filtered.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });

  mc.innerHTML = Object.entries(byDate).sort().map(([date, ms]) => {
    const cards = ms.map(m => {
      const ld = live[m.id] || {};
      const hs = ld.hs !== undefined ? ld.hs : null;
      const as = ld.as !== undefined ? ld.as : null;
      const st = ld.status || 'NS';
      const {cls, txt} = statusLabel(st);
      const isLive = ['1H','2H','HT','ET','BT','LIVE'].includes(st);
      return `<div class="match-card ${isLive ? 'live' : ''}">
        <div class="team-side">
          <div class="team-fn"><span class="tf">${F(m.home)}</span>${m.home}</div>
        </div>
        <div class="score-box">
          <div class="score">${hs !== null ? hs : '-'}&nbsp;:&nbsp;${as !== null ? as : '-'}</div>
          <div class="meta">Gr.${m.grp} · ${m.venue}</div>
          <div class="meta">${m.time} UTC</div>
          <span class="st-badge ${cls}">${txt}${ld.minute ? ' ' + ld.minute + "'" : ''}</span>
        </div>
        <div class="team-side right">
          <div class="team-fn right">${m.away}<span class="tf">${F(m.away)}</span></div>
        </div>
      </div>`;
    }).join('');
    return `<div class="match-day-hdr">${fmtDate(date)}</div>${cards}`;
  }).join('');
}

// ─── RENDU KNOCKOUT ───────────────────────────────────────────────────────────
function renderKnockout() {
  const grid = document.getElementById('ko-grid');
  if (!grid) return;
  grid.innerHTML = KO.map(round => `
    <div>
      <div class="ko-col-title">${round.name}</div>
      ${round.matches.map(m => `
        <div class="ko-match">
          <div class="ko-team"><span>${m.h}</span><span class="ko-score">-</span></div>
          <div class="ko-team"><span>${m.a}</span><span class="ko-score">-</span></div>
          <div class="ko-date">${round.dates}</div>
        </div>`).join('')}
    </div>`).join('');
}

// ─── RENDU STATS ──────────────────────────────────────────────────────────────
function renderStats() {
  const played = STATIC_MATCHES.filter(m => live[m.id]?.status === 'FT').length;
  const inPlay = STATIC_MATCHES.filter(m => ['1H','2H','HT','ET','BT','LIVE'].includes(live[m.id]?.status)).length;
  let goals = 0;
  STATIC_MATCHES.forEach(m => {
    if (live[m.id]?.status === 'FT') goals += (live[m.id].hs || 0) + (live[m.id].as || 0);
  });
  const avg = played > 0 ? (goals / played).toFixed(2) : '—';

  const sg = document.getElementById('sg');
  if (sg) sg.innerHTML = `
    <div class="stat-card"><div class="stat-val">${STATIC_MATCHES.length}</div><div class="stat-lbl">Matchs (groupes)</div></div>
    <div class="stat-card"><div class="stat-val">${played}</div><div class="stat-lbl">Joués</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#e24b4a">${inPlay}</div><div class="stat-lbl">En direct</div></div>
    <div class="stat-card"><div class="stat-val">${goals}</div><div class="stat-lbl">Buts marqués</div></div>
    <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-lbl">Buts / match</div></div>
    <div class="stat-card"><div class="stat-val">48</div><div class="stat-lbl">Nations</div></div>
    <div class="stat-card"><div class="stat-val">104</div><div class="stat-lbl">Total matchs</div></div>
    <div class="stat-card"><div class="stat-val">16</div><div class="stat-lbl">Villes hôtes</div></div>`;

  const sl = document.getElementById('sl');
  if (!sl) return;
  if (!scorers.length) {
    sl.innerHTML = played === 0
      ? '<div class="no-data">Les stats de buteurs apparaîtront après les premiers matchs.</div>'
      : '<div class="no-data">Données buteurs non disponibles sur cette source.</div>';
    return;
  }
  sl.innerHTML = scorers.map((s, i) => `
    <div class="scorer-row">
      <div class="s-rank ${i < 3 ? 'gold' : ''}">${i + 1}</div>
      <div class="s-info">
        <div class="s-name">${s.player?.name || s.name || '—'}</div>
        <div class="s-team">${F(s.team?.name || s.team || '')} ${s.team?.name || s.team || ''}</div>
      </div>
      <div class="s-goals">${s.goals || s.goal_count || 0}<span> buts</span></div>
    </div>`).join('');
}

// ─── NAVIGATION ONGLETS ───────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['groupes','matchs','knockout','stats'][i] === id);
  });
  document.querySelectorAll('.section').forEach(s => {
    s.classList.toggle('active', s.id === id);
  });
  if (id === 'matchs')   renderMatches();
  if (id === 'knockout') renderKnockout();
  if (id === 'stats')    renderStats();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderGroups();
renderMatches();
renderKnockout();
fetchAll();
</script>
